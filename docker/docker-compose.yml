version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
      POSTGRES_DB: devops_platform
    volumes:
      - ../services/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend_v1:
    build: ../services/backend-fastapi
    container_name: backend_v1
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USER: devops
      DB_PASSWORD: devops
      DB_NAME: devops_platform

  backend_v2:
    build: ../services/backend-fastapi
    container_name: backend_v2
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_USER: devops
      DB_PASSWORD: devops
      DB_NAME: devops_platform
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend_v1:
    build: ../services/frontend-react
    container_name: frontend_v1
    restart: always
    depends_on:
      - backend_v1

  frontend_v2:
    build: ../services/frontend-react
    container_name: frontend_v2
    restart: always
    depends_on:
      - backend_v2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - frontend_v1
      - frontend_v2
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf